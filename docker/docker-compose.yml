version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: biniyogbuddy-db
    environment:
      POSTGRES_USER: biniyogbuddy
      POSTGRES_PASSWORD: biniyogbuddy_pass
      POSTGRES_DB: biniyogbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biniyogbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: biniyogbuddy-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/biniyogbuddy
      SPRING_DATASOURCE_USERNAME: biniyogbuddy
      SPRING_DATASOURCE_PASSWORD: biniyogbuddy_pass
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:

