spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      url: ${REDIS_URL}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

logging:
  level:
    root: INFO
    com.biniyogbuddy: INFO